    body {font-family: 'Segoe UI', sans-serif;}
    .glass {background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);} 
  </style>
</head>
<body class="bg-gray-900 text-white">

<!-- Navbar -->
<nav class="flex justify-between p-4 glass fixed w-full top-0 z-50">
  <h1 class="text-xl font-bold">Adv. Sarthak Dutta</h1>
  <div class="space-x-6">
    <a href="#services">Services</a>
    <a href="#chat">AI Chat</a>
    <a href="#booking">Booking</a>
  </div>
</nav>

<!-- Hero -->
<section class="h-screen flex items-center justify-center text-center" style="background: url('profile.jpg') center/cover no-repeat;">
  <div class="glass p-10 rounded-3xl">
    <h2 class="text-5xl font-bold mb-4">Adv. Sarthak Dutta</h2>
    <p class="mb-6 text-lg">Premium Legal Consultation</p>
  </div>
</section>

<!-- Services -->
<section id="services" class="py-16 text-center">
  <h2 class="text-3xl font-bold mb-10">Services</h2>
  <div class="grid md:grid-cols-3 gap-6 px-6">
    <div class="glass p-6 rounded-2xl">Criminal Law</div>
    <div class="glass p-6 rounded-2xl">Corporate Law</div>
    <div class="glass p-6 rounded-2xl">Family Law</div>
    <div class="glass p-6 rounded-2xl">Financial and Economic Crimes </div>
  </div>
</section>

<!-- AI Chatbot -->
<section id="chat" class="py-16 text-center">
  <h2 class="text-3xl font-bold mb-6">AI Legal Assistant 🤖</h2>
  <div class="max-w-xl mx-auto">
    <div id="chatbox" class="bg-black p-4 h-64 overflow-y-auto rounded mb-4 text-left"></div>
    <input id="userInput" type="text" placeholder="Ask legal question..." class="w-full p-3 text-black rounded">
    <button onclick="sendMessage()" class="mt-3 bg-white text-black px-6 py-2 rounded">Send</button>
  </div>
</section>

<script>
function sendMessage(){
  let input = document.getElementById('userInput').value;
  let chatbox = document.getElementById('chatbox');
  chatbox.innerHTML += `<p><b>You:</b> ${input}</p>`;

  let reply = "Please contact for detailed legal advice.";
  if(input.toLowerCase().includes('divorce')) reply = "Divorce cases require proper legal filing. Book consultation.";
  if(input.toLowerCase().includes('property')) reply = "Property disputes need document verification.";

  chatbox.innerHTML += `<p><b>Bot:</b> ${reply}</p>`;
  document.getElementById('userInput').value = '';
}
</script>

<!-- Booking -->
<section id="booking" class="py-16 text-center">
  <h2 class="text-3xl font-bold mb-6">Book Appointment 📅</h2>
